<!DOCTYPE html>
<html>

<head>
    <title>CGPA Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>CGPA Calculator</h1>

        <button id="addBtn">
            Add Subject
        </button>

        <table>
            <thead>
                <tr>
                    <th>Subject</th>
                    <th>Credits</th>
                    <th>Grade</th>
                </tr>
            </thead>

            <tbody id="subjectTable">

            </tbody>
        </table>

        <br>

        <button id="calcBtn">
            Calculate GPA
        </button>

        <h2 id="result">
            GPA: 0.00
        </h2>

    </div>

    <script src="script.js"></script>

</body>

</html>
